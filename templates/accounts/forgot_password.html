{% load pwa %}
<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Forgot Password — Espere</title>
    <link rel="icon" type="image/png" sizes="32x32" href="/static/images/icons/icon-32x32.png">
    {% progressive_web_app_meta %}
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
    <link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:opsz,wght,FILL,GRAD@20..48,100..700,0..1,-50..200&display=swap" rel="stylesheet">
    <style>* { font-family: 'Inter', system-ui, sans-serif; }</style>
</head>
<body class="bg-[#F5F5F5] min-h-screen flex items-center justify-center px-4 antialiased">
    <div class="w-full max-w-sm">
        <!-- Brand -->
        <div class="text-center mb-8">
            <div class="w-16 h-16 bg-[#1A1A1A] rounded-2xl flex items-center justify-center mx-auto mb-4">
                <span class="material-symbols-outlined text-[#C8E64A]" style="font-size:32px;">lock_reset</span>
            </div>
            <h1 class="text-2xl font-bold text-[#1A1A1A]">Forgot Password</h1>
            <p class="text-sm text-[#9E9E9E] mt-1">Enter your email to reset your password</p>
        </div>

        <!-- Flash Messages -->
        {% include "accounts/_messages.html" %}

        <!-- Forgot Password Card -->
        <form method="post" class="bg-white rounded-[24px] p-6 space-y-4" style="box-shadow: 0 1px 8px rgba(0,0,0,0.04), 0 4px 24px rgba(0,0,0,0.04);">
            {% csrf_token %}

            <div>
                <label class="block text-sm font-medium text-[#1A1A1A] mb-1.5">Email Address</label>
                <input type="email" name="email" required autofocus
                       class="w-full px-4 py-3 border border-[#EEEEEE] bg-[#FAFAFA] rounded-[14px] text-sm text-[#1A1A1A] focus:border-[#C8E64A] focus:ring-2 focus:ring-[#C8E64A]/20 outline-none transition-all placeholder:text-[#9E9E9E]"
                       placeholder="Enter your registered email">
            </div>

            <button type="submit" class="w-full py-3.5 bg-[#1A1A1A] text-[#C8E64A] font-semibold rounded-2xl hover:opacity-90 transition-all active:scale-[0.98] text-sm" style="box-shadow: 0 2px 12px rgba(0,0,0,0.06);">
                Send Reset Link
            </button>

            <!-- Attempt Info -->
            <p class="text-xs text-[#9E9E9E] text-center">
                <span class="material-symbols-outlined align-middle" style="font-size:14px;">info</span>
                Max {{ max_attempts }} attempts allowed, then 24h cooldown
            </p>
        </form>

        <p class="text-center text-sm text-[#9E9E9E] mt-5">
            Remember your password?
            <a href="{% url 'accounts:login' %}" class="font-semibold text-[#1A1A1A] hover:underline">Sign in</a>
        </p>
    </div>
</body>
</html>
