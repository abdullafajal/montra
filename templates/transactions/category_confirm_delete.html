{% extends "base.html" %}

{% block title %}Delete Category{% endblock %}

{% block top_bar %}
<div class="px-5 pt-6 pb-2 lg:px-6 lg:pt-8 flex items-center gap-3">
    <a href="{% url 'transactions:category_list' %}" class="w-10 h-10 rounded-xl bg-mn-card dark:bg-mn-card-dark flex items-center justify-center shadow-soft">
        <span class="material-symbols-outlined icon-md text-mn-text dark:text-mn-text-dark">arrow_back</span>
    </a>
    <h1 class="text-lg font-bold text-mn-text dark:text-mn-text-dark">Confirm Delete</h1>
</div>
{% endblock %}

{% block content %}
<div class="animate-fade-in max-w-md mx-auto mt-4">
    <div class="mn-card p-6 text-center">
        <div class="w-16 h-16 bg-expense-light rounded-full flex items-center justify-center mx-auto mb-4">
            <span class="material-symbols-outlined text-expense" style="font-size:32px;">delete</span>
        </div>
        <h2 class="text-lg font-bold text-mn-text dark:text-mn-text-dark mb-2">Delete "{{ category.name }}"?</h2>
        <div class="flex items-center justify-center gap-2 text-mn-muted dark:text-mn-muted-dark mb-6">
            <span class="material-symbols-outlined" style="color:{{ category.color }};font-size:20px;">{{ category.icon }}</span>
            <span class="text-sm">{{ category.name }}</span>
        </div>
        <form method="post" class="flex gap-3">
            {% csrf_token %}
            <a href="{% url 'transactions:category_list' %}" class="flex-1 py-3 bg-mn-bg dark:bg-mn-bg-dark text-mn-text dark:text-mn-text-dark text-sm font-semibold rounded-2xl hover:opacity-80 transition-colors text-center">Cancel</a>
            <button type="submit" class="flex-1 py-3 bg-expense text-white text-sm font-semibold rounded-2xl hover:bg-expense-dark transition-colors active:scale-[0.97]">Delete</button>
        </form>
    </div>
</div>
{% endblock %}
