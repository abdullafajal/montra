{% load static %}
<div class="relative custom-select-container" id="container-{{ widget.name }}">
    <!-- Original Hidden Select (Django binds to this) -->
    <select name="{{ widget.name }}" id="{{ widget.attrs.id }}" class="hidden" onchange="updateCustomSelectDisplay('{{ widget.name }}')">
        {% for group in widget.optgroups %}
            {% for option in group.1 %}
                <option value="{{ option.value }}" {% if option.selected %}selected{% endif %}>{{ option.label }}</option>
            {% endfor %}
        {% endfor %}
    </select>

    <!-- Custom Trigger Button -->
    <button type="button" 
            class="w-full flex items-center justify-between px-4 py-3 text-left bg-mn-card dark:bg-mn-card-dark border border-mn-border dark:border-mn-border-dark rounded-xl focus:ring-2 focus:ring-mn-accent transition-all group"
            onclick="toggleCustomSelect('{{ widget.name }}')">
        
        <div class="flex items-center gap-3 min-w-0 flex-1" id="display-{{ widget.name }}">
            <span class="text-mn-muted dark:text-mn-muted-dark truncate">Select Category</span>
        </div>
        
        <span class="material-symbols-outlined text-mn-muted dark:text-mn-muted-dark transition-transform duration-200 group-aria-expanded:rotate-180">expand_more</span>
    </button>

    <!-- Custom Options List -->
    <div class="hidden absolute left-0 right-0 top-full mt-1 z-50 max-h-72 overflow-y-auto bg-mn-card dark:bg-mn-card-dark border border-mn-border dark:border-mn-border-dark rounded-xl shadow-xl animate-scale-in"
         id="options-{{ widget.name }}">
         
        <!-- Search Input -->
        <div class="sticky top-0 bg-mn-card dark:bg-mn-card-dark p-2 border-b border-mn-border dark:border-mn-border-dark z-10">
            <div class="relative">
                <input type="text" 
                       id="search-{{ widget.name }}"
                       placeholder="Search category..." 
                       class="w-full px-4 py-2 text-sm bg-mn-bg dark:bg-mn-bg-dark border-none rounded-lg focus:ring-1 focus:ring-mn-accent outline-none text-mn-text dark:text-mn-text-dark"
                       onkeyup="filterCategories('{{ widget.name }}')"
                       autocomplete="off">
            </div>
        </div>

        <div id="list-{{ widget.name }}">
            {% for cat in categories %}
        <div class="flex items-center gap-3 px-4 py-3 cursor-pointer hover:bg-mn-bg dark:hover:bg-mn-bg-dark transition-colors border-b border-mn-border/10 dark:border-mn-border-dark/10 last:border-0"
             onclick="selectCustomOption('{{ widget.name }}', '{{ cat.id }}', '{{ cat.name|escapejs }}', '{{ cat.icon }}', '{{ cat.color }}')">
            <div class="w-8 h-8 rounded-lg flex items-center justify-center shrink-0 bg-mn-accent">
                <span class="material-symbols-outlined text-mn-dark" style="font-size: 18px;">{{ cat.icon }}</span>
            </div>
            <span class="text-sm font-medium text-mn-text dark:text-mn-text-dark truncate">{{ cat.name }}</span>
            
            <!-- Checkmark for selected state (handled by JS) -->
            <span class="material-symbols-outlined text-mn-accent ml-auto opacity-0 check-{{ cat.id }}" style="font-size: 18px;">check</span>
        </div>
        {% endfor %}
        </div>
        
        <!-- No Results Msg -->
        <div id="no-results-{{ widget.name }}" class="hidden px-4 py-6 text-center">
            <span class="material-symbols-outlined text-mn-muted dark:text-mn-muted-dark mb-2" style="font-size: 32px;">search_off</span>
            <p class="text-xs text-mn-muted dark:text-mn-muted-dark">No categories found</p>
        </div>
    </div>
</div>

<script>
    // Initialize
    document.addEventListener("DOMContentLoaded", function() {
        const name = '{{ widget.name }}';
        const select = document.getElementById('{{ widget.attrs.id }}');
        
        // Initial setup if value exists
        if (select.value) {
            const catId = select.value;
            const options = document.querySelectorAll(`#list-${name} > div`);
            options.forEach(opt => {
                const clickAttr = opt.getAttribute('onclick');
                if (clickAttr && clickAttr.includes(`, '${catId}',`)) {
                    // Extract data from the onclick attribute to set display without actual click
                    const regex = /selectCustomOption\('.+?', '(.+?)', '(.+?)', '(.+?)', '(.+?)'\)/;
                    const match = clickAttr.match(regex);
                    if (match) {
                        const [_, id, label, icon, color] = match;
                        // Manual update to avoid side effects of .click()
                        const display = document.getElementById(`display-${name}`);
                        display.innerHTML = `
                            <div class="w-6 h-6 rounded flex items-center justify-center shrink-0 bg-mn-accent">
                                <span class="material-symbols-outlined text-mn-dark" style="font-size: 16px;">${icon}</span>
                            </div>
                            <span class="text-sm font-medium text-mn-text dark:text-mn-text-dark truncate">${label}</span>
                        `;
                        const check = document.querySelector(`#options-${name} .check-${id}`);
                        if(check) {
                            check.classList.remove('opacity-0');
                            check.classList.add('opacity-100');
                        }
                    }
                }
            });
        }
        
        // Close on click outside
        document.addEventListener('click', function(e) {
            const container = document.getElementById(`container-${name}`);
            if (!container.contains(e.target)) {
                document.getElementById(`options-${name}`).classList.add('hidden');
            }
        });
    });

    function toggleCustomSelect(name) {
        const options = document.getElementById(`options-${name}`);
        const isHidden = options.classList.contains('hidden');
        
        // Hide all other dropdowns first if multiple exist
        document.querySelectorAll('.custom-select-container [id^="options-"]').forEach(opt => {
            if (opt.id !== `options-${name}`) opt.classList.add('hidden');
        });

        options.classList.toggle('hidden');
        
        if (isHidden) {
            const searchInput = document.getElementById(`search-${name}`);
            searchInput.value = '';
            filterCategories(name);
        }
    }

    function filterCategories(name) {
        const query = document.getElementById(`search-${name}`).value.toLowerCase();
        const options = document.querySelectorAll(`#list-${name} > div`);
        const noResults = document.getElementById(`no-results-${name}`);
        let hasVisible = false;

        options.forEach(opt => {
            const label = opt.querySelector('span:not(.material-symbols-outlined)').textContent.toLowerCase();
            if (label.includes(query)) {
                opt.style.display = 'flex';
                hasVisible = true;
            } else {
                opt.style.display = 'none';
            }
        });

        noResults.classList.toggle('hidden', hasVisible);
    }

    function selectCustomOption(name, value, label, icon, color) {
        const select = document.querySelector(`select[name="${name}"]`);
        select.value = value;
        select.dispatchEvent(new Event('change')); // Notify Django form
        
        // Update UI
        const display = document.getElementById(`display-${name}`);
        display.innerHTML = `
            <div class="w-6 h-6 rounded flex items-center justify-center shrink-0 bg-mn-accent">
                <span class="material-symbols-outlined text-mn-dark" style="font-size: 16px;">${icon}</span>
            </div>
            <span class="text-sm font-medium text-mn-text dark:text-mn-text-dark truncate">${label}</span>
        `;
        
        // Hide dropdown
        document.getElementById(`options-${name}`).classList.add('hidden');
        
        // Update checkmarks
        document.querySelectorAll(`#options-${name} .opacity-100`).forEach(el => el.classList.remove('opacity-100'));
        document.querySelectorAll(`#options-${name} .opacity-100`).forEach(el => el.classList.add('opacity-0'));
        
        const check = document.querySelector(`#options-${name} .check-${value}`);
        if(check) {
            check.classList.remove('opacity-0');
            check.classList.add('opacity-100');
        }
    }
    
    function updateCustomSelectDisplay(name, value) {
         // Logic to find option data by value if we didn't click it
         // This is a backup for initial load. 
         // For now, the loop in DOMContentLoaded suffices implicitly if we iterate choices.
    }
</script>
